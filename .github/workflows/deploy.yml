name: Docker CI Smcapis

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Usamos tu secreto personal (GH_PAT) en lugar del token automático
          # Esto permite crear el paquete en la organización sin errores de permiso
          password: ${{ secrets.GH_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Mantenemos la ruta manual en minúsculas para evitar el error de 'invalid tag'
          tags: |
            ghcr.io/lafloridaapps/smcapis:latest
          labels: |
            org.opencontainers.image.title=smcapis-container