name: Gitea CI Smcapis Local

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          # Evita errores de permisos de Git en el runner de Gitea
          set-safe-directory: true

      - name: Iniciar sesión en el Registro de Gitea
        uses: docker/login-action@v3
        with:
          registry: desarrollo:3000
          # Usamos github.actor (compatible con Gitea) para que el editor no marque error
          username: ${{ github.actor }}
          # Nombre exacto del secreto que configuraste en la interfaz de Gitea
          password: ${{ secrets.GITEATOKEN }}

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Etiqueta para tu servidor local Sakura
          tags: |
            desarrollo:3000/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.title=smcapis-container